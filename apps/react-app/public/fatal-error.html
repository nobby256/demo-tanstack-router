<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>エラー</title>

    <style>
      body {
        font-family: sans-serif;
        padding: 40px;
        background: #f5f5f5;
      }

      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 32px;
        border-radius: 8px;
      }

      h1 {
        color: #c62828;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="title"></h1>
      <p id="message"></p>
    </div>

    <script>
      const status = new URLSearchParams(location.search).get('status')

      const messages = {
        400: {
          title: '不正なリクエスト（400）',
          message: '不正なリクエストは受け付けることが出来ません',
        },
        403: {
          title: 'セッションタイムアウト（403）',
          message: '再度ログインしてください。',
        },
        404: {
          title: '存在しないURL（404）',
          message: 'リクエストされたURLは存在しません',
        },
      }

      const view = messages[status] ?? {
        title: 'その他エラー',
        message: '予期しないエラーが発生しました。',
      }

      document.getElementById('title').textContent = view.title

      document.getElementById('message').textContent = view.message
    </script>
  </body>
</html>
